name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Worker types
        run: bunx wrangler types

      - name: Lint (Prettier)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit & integration tests
        run: bun run test

      - name: Dependency audit
        run: bun audit || true # informational: surface advisories without blocking merges
